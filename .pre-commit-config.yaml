# See https://pre-commit.com/ for usage and config
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.0.292
    hooks:
      - id: ruff
        args: [ --fix, --exit-non-zero-on-fix ]
  - repo: local
    hooks:

      - id: black
        args: [ "--line-length", "100" ]
        name: black
        stages: [ commit ]
        language: system
        entry: black
        types: [ python ]

#      - id: pytest
